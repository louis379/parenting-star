// ─── 工具函式 ─────────────────────────────────────────────

function useLocalStorage(key, defaultValue) {
  const [value, setValue] = useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored ? JSON.parse(stored) : defaultValue;
    } catch { return defaultValue; }
  });
  const set = useCallback((v) => {
    setValue(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  }, [key]);
  return [value, set];
}

function calcAge(birthdate) {
  if (!birthdate) return '';
  const now = new Date();
  const b = new Date(birthdate);
  const months = (now.getFullYear() - b.getFullYear()) * 12 + now.getMonth() - b.getMonth();
  if (months < 1) return '未滿1個月';
  if (months < 12) return `${months} 個月`;
  const years = Math.floor(months / 12);
  const rem = months % 12;
  return rem > 0 ? `${years} 歲 ${rem} 個月` : `${years} 歲`;
}

function PlannerPage({ selectedAge, setSelectedAge }) {
  const [plans, setPlans] = useLocalStorage('planner_plans', {});
  const [showAdd, setShowAdd] = useState(false);
  const [newTime, setNewTime] = useState('');
  const [newActivity, setNewActivity] = useState('');

  const currentPlan = plans[selectedAge] || DEFAULT_PLANS[selectedAge].map((p, i) => ({ ...p, id: i }));

  function savePlan(updated) {
    setPlans({ ...plans, [selectedAge]: updated });
  }

  function toggleDone(id) {
    savePlan(currentPlan.map(p => p.id === id ? { ...p, done: !p.done } : p));
  }

  function removeItem(id) {
    savePlan(currentPlan.filter(p => p.id !== id));
  }

  function addItem() {
    if (!newTime || !newActivity) return;
    const updated = [...currentPlan, { time: newTime, activity: newActivity, done: false, id: Date.now() }]
      .sort((a, b) => a.time.localeCompare(b.time));
    savePlan(updated);
    setNewTime('');
    setNewActivity('');
    setShowAdd(false);
  }

  function resetToDefault() {
    savePlan(DEFAULT_PLANS[selectedAge].map((p, i) => ({ ...p, id: i })));
  }

  const done = currentPlan.filter(p => p.done).length;
  const pct = currentPlan.length ? Math.round(done / currentPlan.length * 100) : 0;

  return (
    <div>
      <Header title="今日行程 📅" subtitle="規劃美好的親子時光" />
      <div className="px-4 pt-3">
        <AgeSelector selectedAge={selectedAge} onChange={setSelectedAge} />
      </div>

      <div className="px-4 py-2">
        <div className="card p-4 mb-3">
          <div className="flex items-center justify-between mb-2">
            <span className="text-sm font-semibold text-gray-700">今日完成進度</span>
            <span className="text-sm font-bold" style={{ color: '#FF7043' }}>{done}/{currentPlan.length} ({pct}%)</span>
          </div>
          <div className="w-full h-3 bg-gray-100 rounded-full overflow-hidden">
            <div className="h-full rounded-full transition-all"
              style={{ width: `${pct}%`, background: 'linear-gradient(90deg, #FF7043, #FF4081)' }} />
          </div>
        </div>

        <div className="space-y-2 mb-3">
          {currentPlan.map(item => (
            <div key={item.id} className="card p-3 flex items-center gap-3"
              style={{ opacity: item.done ? 0.6 : 1 }}>
              <button onClick={() => toggleDone(item.id)}
                className="w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all"
                style={{
                  borderColor: item.done ? '#4CAF50' : '#ddd',
                  background: item.done ? '#4CAF50' : 'white',
                }}>
                {item.done && <span className="text-white text-xs">✓</span>}
              </button>
              <span className="text-xs text-gray-400 w-12 flex-shrink-0">{item.time}</span>
              <span className="text-sm text-gray-700 flex-1"
                style={{ textDecoration: item.done ? 'line-through' : 'none' }}>
                {item.activity}
              </span>
              <button onClick={() => removeItem(item.id)} className="text-gray-300 hover:text-red-400 text-lg flex-shrink-0">×</button>
            </div>
          ))}
        </div>

        {showAdd ? (
          <div className="card p-4 mb-3">
            <div className="text-sm font-semibold text-gray-700 mb-3">新增活動</div>
            <div className="flex gap-2 mb-3">
              <input type="time" value={newTime} onChange={e => setNewTime(e.target.value)}
                className="border border-gray-200 rounded-xl px-3 py-2 text-sm w-28" />
              <input type="text" value={newActivity} onChange={e => setNewActivity(e.target.value)}
                placeholder="輸入活動內容" className="border border-gray-200 rounded-xl px-3 py-2 text-sm flex-1" />
            </div>
            <div className="flex gap-2">
              <button onClick={addItem}
                className="flex-1 py-2 rounded-xl text-white text-sm font-semibold"
                style={{ background: '#FF7043' }}>確認新增</button>
              <button onClick={() => setShowAdd(false)}
                className="flex-1 py-2 rounded-xl text-gray-500 text-sm border border-gray-200">取消</button>
            </div>
          </div>
        ) : (
          <div className="flex gap-2">
            <button onClick={() => setShowAdd(true)}
              className="flex-1 py-3 rounded-xl text-white text-sm font-semibold"
              style={{ background: '#FF7043' }}>＋ 新增活動</button>
            <button onClick={resetToDefault}
              className="px-4 py-3 rounded-xl text-gray-500 text-sm border border-gray-200 bg-white">重設預設</button>
          </div>
        )}
      </div>
    </div>
  );
}

function RecordPage() {
  const [children, setChildren] = useLocalStorage('record_children', []);
  const [records, setRecords] = useLocalStorage('record_entries', []);
  const [selectedChild, setSelectedChild] = useState(null);
  const [showAddChild, setShowAddChild] = useState(false);
  const [showAddRecord, setShowAddRecord] = useState(false);
  const [childName, setChildName] = useState('');
  const [childBirth, setChildBirth] = useState('');
  const [recType, setRecType] = useState('milestone');
  const [recTitle, setRecTitle] = useState('');
  const [recNote, setRecNote] = useState('');
  const [recDate, setRecDate] = useState(new Date().toISOString().slice(0, 10));

  useEffect(() => {
    if (!selectedChild && children.length > 0) setSelectedChild(children[0].id);
  }, [children]);

  function addChild() {
    if (!childName) return;
    const child = { id: Date.now(), name: childName, birthdate: childBirth };
    const updated = [...children, child];
    setChildren(updated);
    setSelectedChild(child.id);
    setChildName('');
    setChildBirth('');
    setShowAddChild(false);
  }

  function removeChild(id) {
    setChildren(children.filter(c => c.id !== id));
    setRecords(records.filter(r => r.childId !== id));
    if (selectedChild === id) setSelectedChild(children.find(c => c.id !== id)?.id || null);
  }

  function addRecord() {
    if (!recTitle || !selectedChild) return;
    const r = { id: Date.now(), childId: selectedChild, type: recType, title: recTitle, note: recNote, date: recDate };
    setRecords([r, ...records]);
    setRecTitle('');
    setRecNote('');
    setShowAddRecord(false);
  }

  const childRecords = records.filter(r => r.childId === selectedChild)
    .sort((a, b) => b.date.localeCompare(a.date));

  const currentChild = children.find(c => c.id === selectedChild);

  return (
    <div>
      <Header title="成長紀錄 📔" subtitle="記錄每個珍貴時刻" />
      <div className="px-4 py-3">

        {/* 孩子選擇 */}
        <div className="flex gap-2 mb-3 flex-wrap">
          {children.map(c => (
            <button key={c.id} onClick={() => setSelectedChild(c.id)}
              className="flex items-center gap-2 px-3 py-2 rounded-full text-sm font-semibold transition-all"
              style={{
                background: selectedChild === c.id ? '#FF7043' : 'white',
                color: selectedChild === c.id ? 'white' : '#666',
                boxShadow: '0 2px 8px rgba(0,0,0,0.08)',
              }}>
              <span>👶</span>
              <span>{c.name}</span>
              {c.birthdate && <span className="opacity-75 text-xs">{calcAge(c.birthdate)}</span>}
            </button>
          ))}
          <button onClick={() => setShowAddChild(!showAddChild)}
            className="px-3 py-2 rounded-full text-sm border-2 border-dashed text-gray-400 border-gray-300">
            ＋ 新增小孩
          </button>
        </div>

        {/* 新增小孩 */}
        {showAddChild && (
          <div className="card p-4 mb-3">
            <div className="text-sm font-semibold text-gray-700 mb-3">新增小孩</div>
            <input value={childName} onChange={e => setChildName(e.target.value)}
              placeholder="孩子的名字" className="border border-gray-200 rounded-xl px-3 py-2 text-sm w-full mb-2" />
            <div className="text-xs text-gray-400 mb-1">出生日期（選填）</div>
            <input type="date" value={childBirth} onChange={e => setChildBirth(e.target.value)}
              className="border border-gray-200 rounded-xl px-3 py-2 text-sm w-full mb-3" />
            <div className="flex gap-2">
              <button onClick={addChild}
                className="flex-1 py-2 rounded-xl text-white text-sm font-semibold" style={{ background: '#FF7043' }}>
                確認新增
              </button>
              <button onClick={() => setShowAddChild(false)}
                className="flex-1 py-2 rounded-xl text-gray-500 text-sm border border-gray-200">取消</button>
            </div>
          </div>
        )}

        {currentChild && (
          <>
            <div className="card p-4 mb-3 flex items-center justify-between">
              <div>
                <div className="font-bold text-gray-800">👶 {currentChild.name}</div>
                {currentChild.birthdate && (
                  <div className="text-sm text-gray-500">{calcAge(currentChild.birthdate)} · 生日 {currentChild.birthdate}</div>
                )}
                <div className="text-xs text-gray-400 mt-1">{childRecords.length} 筆紀錄</div>
              </div>
              <button onClick={() => removeChild(currentChild.id)}
                className="text-gray-300 text-sm hover:text-red-400">移除</button>
            </div>

            {/* 新增紀錄 */}
            {showAddRecord ? (
              <div className="card p-4 mb-3">
                <div className="text-sm font-semibold text-gray-700 mb-3">新增紀錄</div>
                <div className="flex gap-2 mb-3 flex-wrap">
                  {RECORD_TYPES.map(t => (
                    <button key={t.id} onClick={() => setRecType(t.id)}
                      className="px-3 py-1 rounded-full text-xs font-semibold transition-all"
                      style={{
                        background: recType === t.id ? t.color : t.color + '22',
                        color: recType === t.id ? 'white' : t.color,
                      }}>
                      {t.emoji} {t.label}
                    </button>
                  ))}
                </div>
                <input type="date" value={recDate} onChange={e => setRecDate(e.target.value)}
                  className="border border-gray-200 rounded-xl px-3 py-2 text-sm w-full mb-2" />
                <input value={recTitle} onChange={e => setRecTitle(e.target.value)}
                  placeholder="紀錄標題（必填）" className="border border-gray-200 rounded-xl px-3 py-2 text-sm w-full mb-2" />
                <textarea value={recNote} onChange={e => setRecNote(e.target.value)}
                  placeholder="詳細描述（選填）"
                  className="border border-gray-200 rounded-xl px-3 py-2 text-sm w-full mb-3 resize-none" rows={3} />
                <div className="flex gap-2">
                  <button onClick={addRecord}
                    className="flex-1 py-2 rounded-xl text-white text-sm font-semibold" style={{ background: '#FF7043' }}>
                    儲存紀錄
                  </button>
                  <button onClick={() => setShowAddRecord(false)}
                    className="flex-1 py-2 rounded-xl text-gray-500 text-sm border border-gray-200">取消</button>
                </div>
              </div>
            ) : (
              <button onClick={() => setShowAddRecord(true)}
                className="w-full py-3 rounded-xl text-white text-sm font-semibold mb-3"
                style={{ background: '#FF7043' }}>
                ＋ 新增成長紀錄
              </button>
            )}

            {/* 紀錄列表 */}
            {childRecords.length === 0 ? (
              <div className="card p-8 text-center">
                <div className="text-4xl mb-3">📝</div>
                <div className="text-gray-400 text-sm">還沒有任何紀錄</div>
                <div className="text-gray-300 text-xs mt-1">點擊上方按鈕開始記錄</div>
              </div>
            ) : (
              <div className="space-y-2">
                {childRecords.map(r => {
                  const type = RECORD_TYPES.find(t => t.id === r.type) || RECORD_TYPES[0];
                  return (
                    <div key={r.id} className="card p-4 flex gap-3">
                      <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0"
                        style={{ background: type.color + '22' }}>
                        {type.emoji}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="font-semibold text-gray-800 text-sm">{r.title}</span>
                          <span className="tag text-xs py-0 px-2"
                            style={{ background: type.color + '22', color: type.color }}>
                            {type.label}
                          </span>
                        </div>
                        {r.note && <div className="text-xs text-gray-500 mt-1">{r.note}</div>}
                        <div className="text-xs text-gray-400 mt-1">📅 {r.date}</div>
                      </div>
                      <button onClick={() => setRecords(records.filter(x => x.id !== r.id))}
                        className="text-gray-200 hover:text-red-400 text-lg flex-shrink-0">×</button>
                    </div>
                  );
                })}
              </div>
            )}
          </>
        )}

        {children.length === 0 && !showAddChild && (
          <div className="card p-10 text-center">
            <div className="text-5xl mb-4">👶</div>
            <div className="text-gray-600 font-semibold mb-2">開始記錄孩子的成長吧！</div>
            <div className="text-gray-400 text-sm mb-4">點擊「新增小孩」建立第一個檔案</div>
            <button onClick={() => setShowAddChild(true)}
              className="px-6 py-3 rounded-xl text-white font-semibold" style={{ background: '#FF7043' }}>
              ＋ 新增小孩
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── 主應用程式 ──────────────────────────────────────────

function App() {
  const [tab, setTab] = useState('home');
  const [selectedAge, setSelectedAge] = useLocalStorage('selected_age', 'toddler');
  const [children] = useLocalStorage('record_children', []);

  const tabs = [
    { id: 'home',    label: '首頁',  emoji: '🏠' },
    { id: 'guide',   label: '指南',  emoji: '📖' },
    { id: 'planner', label: '行程',  emoji: '📅' },
    { id: 'sos',     label: '急救',  emoji: '🚨' },
    { id: 'record',  label: '紀錄',  emoji: '📔' },
  ];

  return (
    <div className="max-w-lg mx-auto relative" style={{ minHeight: '100vh' }}>
      <div className="content-area">
        {tab === 'home'    && <HomePage selectedAge={selectedAge} setSelectedAge={setSelectedAge} children={children} />}
        {tab === 'guide'   && <GuidePage selectedAge={selectedAge} setSelectedAge={setSelectedAge} />}
        {tab === 'planner' && <PlannerPage selectedAge={selectedAge} setSelectedAge={setSelectedAge} />}
        {tab === 'sos'     && <SOSPage />}
        {tab === 'record'  && <RecordPage />}
      </div>

      <div className="tab-bar">
        <div className="flex">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className="flex-1 flex flex-col items-center justify-center py-2 transition-all"
              style={{ color: tab === t.id ? '#FF7043' : '#999' }}>
              <span className="text-xl">{t.emoji}</span>
              <span className="text-xs mt-0.5 font-semibold">{t.label}</span>
              {tab === t.id && (
                <div className="w-1 h-1 rounded-full mt-0.5" style={{ background: '#FF7043' }} />
              )}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
